<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Compliance Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🧴</div>
      <div>
        <div class="logo-text">Compliance Mgr</div>
        <div class="logo-sub">Cosmetics Regulatory</div>
      </div>
    </div>
    <div class="sidebar-nav">
      <span class="nav-label">Compliance</span>
      <a href="dashboard.html" class="nav-link">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <span class="nav-label">Admin</span>
      <a href="admin.html" class="nav-link active">
        <span class="nav-icon">⚙️</span> Manage
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="nav-user" onclick="openProfileEditor()" style="cursor:pointer" title="Edit profile">Loading…</div>
          <div class="user-role" id="nav-role">User</div>
        </div>
        <button class="btn-signout" onclick="signOut()" title="Sign out">⏏</button>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <div class="main-content">
    <div class="page-header">
      <div class="page-header-left">
        <h1 id="page-title">Admin</h1>
        <p id="page-subtitle">Manage your organisation.</p>
      </div>
    </div>

    <div class="page-body">
      <div class="tabs" id="tab-bar">
        <!-- Tabs injected by JS based on role -->
      </div>

      <!-- ── Companies tab (platform admin only) ──────────────────────────── -->
      <div class="tab-panel" id="tab-companies" style="display:none">
        <div class="card">
          <div class="card-header">
            <span class="card-title">Companies</span>
            <button class="btn btn-primary btn-sm" id="btn-new-company">+ Add Company</button>
          </div>
          <div class="table-wrap" id="companies-list">
            <div class="loader-wrap"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

      <!-- ── Products tab ─────────────────────────────────────────────────── -->
      <div class="tab-panel" id="tab-products" style="display:none">
        <div class="card">
          <div class="card-header">
            <span class="card-title">All Products</span>
            <button class="btn btn-primary btn-sm" id="btn-new-product">+ Add Product</button>
          </div>
          <div class="table-wrap" id="products-list">
            <div class="loader-wrap"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

      <!-- ── Document Types tab (platform admin only) ─────────────────────── -->
      <div class="tab-panel" id="tab-doctypes" style="display:none">
        <div class="card">
          <div class="card-header">
            <span class="card-title">Document Types</span>
            <button class="btn btn-primary btn-sm" id="btn-new-doctype">+ Add Type</button>
          </div>
          <div class="table-wrap" id="doctypes-list">
            <div class="loader-wrap"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

      <!-- ── Users tab ────────────────────────────────────────────────────── -->
      <div class="tab-panel" id="tab-users" style="display:none">
        <div class="card">
          <div class="card-header">
            <span class="card-title" id="users-card-title">Users</span>
            <div style="display:flex;gap:8px;align-items:center">
              <input type="text" id="user-search" placeholder="Search users…" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:.85rem;width:180px">
            </div>
          </div>
          <div class="table-wrap" id="users-list">
            <div class="loader-wrap"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- Invite card -->
        <div class="card mt-24">
          <div class="card-header">
            <span class="card-title">Invite New User</span>
          </div>
          <div class="card-body" style="padding:20px 22px">
            <p class="text-sm text-muted" style="margin-bottom:18px">
              The user will receive an email with a sign-in link. They set their password on first login.
            </p>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" id="inv-name" placeholder="Jane Smith">
              </div>
              <div class="form-group">
                <label class="form-label">Email Address <span class="required">*</span></label>
                <input type="email" id="inv-email" placeholder="jane@company.com">
              </div>
              <div class="form-group" id="inv-company-group" style="display:none">
                <label class="form-label">Company <span class="required">*</span></label>
                <select id="inv-org">
                  <option value="">Select company…</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Role</label>
                <select id="inv-role">
                  <option value="user">User</option>
                  <option value="org_admin">Org Admin</option>
                </select>
              </div>
            </div>
            <button class="btn btn-primary btn-sm" id="btn-send-invite">Send Invite</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
let currentProfile = null;
let allUsers = [];
let allCompanies = [];

async function init() {
  const session = await requireAuth();
  if (!session) return;

  currentProfile = await getUserProfile();
  if (!currentProfile) { window.location.href = 'dashboard.html'; return; }

  const isPlatformAdmin = currentProfile.role === 'admin';
  const isOrgAdmin      = currentProfile.role === 'org_admin';

  if (!isPlatformAdmin && !isOrgAdmin) {
    showToast('Admin access required.', 'error');
    setTimeout(() => window.location.href = 'dashboard.html', 1500);
    return;
  }

  document.getElementById('nav-user').textContent    = currentProfile.full_name || currentProfile.id.slice(0, 8);
  document.getElementById('nav-role').textContent    = isPlatformAdmin ? 'Platform Admin' : 'Org Admin';
  document.getElementById('user-avatar').textContent = (currentProfile.full_name || 'A')[0].toUpperCase();

  if (isPlatformAdmin) {
    document.getElementById('page-title').textContent    = 'Platform Admin';
    document.getElementById('page-subtitle').textContent = 'Manage all companies, users, products and document types.';
    buildTabs([
      { key: 'companies', label: '🏢 Companies' },
      { key: 'products',  label: '📦 Products'  },
      { key: 'doctypes',  label: '📄 Doc Types'  },
      { key: 'users',     label: '👥 Users'      },
    ]);
    loadCompanies();
    loadProducts();
    loadDocTypes();
    await loadAllUsers();
    setupCompanyBtn();
    setupProductBtn();
    setupDocTypeBtn();
    setupInvite(true);
  } else {
    document.getElementById('page-title').textContent    = 'Organisation Admin';
    document.getElementById('page-subtitle').textContent = 'Manage your products and team.';
    buildTabs([
      { key: 'products', label: '📦 Products' },
      { key: 'users',    label: '👥 Users'    },
    ]);
    loadProducts();
    await loadOrgUsers();
    setupProductBtn();
    setupInvite(false);
  }
}

// ─── Tabs ──────────────────────────────────────────────────────────────────────
function buildTabs(tabs) {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = tabs.map((t, i) =>
    `<button class="tab-btn${i === 0 ? ' active' : ''}" data-tab="${t.key}">${t.label}</button>`
  ).join('');

  // Show first tab
  document.getElementById('tab-' + tabs[0].key).style.display = '';
  document.getElementById('tab-' + tabs[0].key).classList.add('active');

  bar.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      bar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => { p.classList.remove('active'); p.style.display = 'none'; });
      btn.classList.add('active');
      const panel = document.getElementById('tab-' + btn.dataset.tab);
      panel.style.display = '';
      panel.classList.add('active');
    });
  });
}

// ─── Companies (platform admin) ───────────────────────────────────────────────
async function loadCompanies() {
  const el = document.getElementById('companies-list');
  try {
    const { data, error } = await sb.from('admin_orgs_view').select('*');
    if (error) throw error;
    allCompanies = data || [];
    renderCompanies(allCompanies);
    populateOrgSelect(allCompanies);
  } catch (err) {
    el.innerHTML = `<div class="empty-state"><p class="text-muted">${err.message}</p></div>`;
  }
}

function renderCompanies(rows) {
  const el = document.getElementById('companies-list');
  if (!rows.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🏢</div><h3>No companies yet</h3></div>`;
    return;
  }
  el.innerHTML = `
    <table>
      <thead>
        <tr><th>Company</th><th>Slug</th><th>Users</th><th>Products</th><th>Created</th><th></th></tr>
      </thead>
      <tbody>
        ${rows.map(c => `
          <tr>
            <td class="td-name">${escHtml(c.name)}</td>
            <td><code style="background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:.8rem">${escHtml(c.slug)}</code></td>
            <td class="text-sm text-muted">${c.user_count}</td>
            <td class="text-sm text-muted">${c.product_count}</td>
            <td class="text-sm text-muted">${formatDate(c.created_at)}</td>
            <td>
              <button class="btn btn-ghost btn-sm" onclick="editCompany('${c.id}','${escHtml(c.name)}')">Edit</button>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

function setupCompanyBtn() {
  document.getElementById('btn-new-company').addEventListener('click', () => {
    openModal({
      title: 'Add Company',
      body: `
        <div class="form-group">
          <label class="form-label">Company Name <span class="required">*</span></label>
          <input type="text" id="co-name" placeholder="Acme Cosmetics ApS">
        </div>`,
      confirmText: 'Add Company',
      confirmCls: 'btn-primary',
      onConfirm: async (overlay) => {
        const name = document.getElementById('co-name').value.trim();
        if (!name) { showToast('Company name is required.', 'error'); return; }
        const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
        const btn  = overlay.querySelector('#modal-confirm');
        btn.disabled = true; btn.textContent = 'Adding…';
        try {
          const { error } = await sb.from('organizations').insert({ name, slug });
          if (error) throw error;
          overlay.remove();
          showToast('Company added.');
          loadCompanies();
        } catch (err) {
          showToast(err.message, 'error');
          btn.disabled = false; btn.textContent = 'Add Company';
        }
      }
    });
  });
}

function editCompany(id, name) {
  openModal({
    title: 'Edit Company',
    body: `
      <div class="form-group">
        <label class="form-label">Company Name <span class="required">*</span></label>
        <input type="text" id="eco-name" value="${name}">
      </div>`,
    confirmText: 'Save',
    onConfirm: async (overlay) => {
      const newName = document.getElementById('eco-name').value.trim();
      if (!newName) { showToast('Name required.', 'error'); return; }
      const slug = newName.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      const btn  = overlay.querySelector('#modal-confirm');
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        const { error } = await sb.from('organizations').update({ name: newName, slug }).eq('id', id);
        if (error) throw error;
        overlay.remove(); showToast('Company updated.'); loadCompanies();
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false; btn.textContent = 'Save';
      }
    }
  });
}

function populateOrgSelect(orgs) {
  const sel = document.getElementById('inv-org');
  sel.innerHTML = '<option value="">Select company…</option>' +
    orgs.map(o => `<option value="${o.id}">${escHtml(o.name)}</option>`).join('');
}

// ─── Users ─────────────────────────────────────────────────────────────────────
async function loadAllUsers() {
  document.getElementById('users-card-title').textContent = 'All Users';
  const el = document.getElementById('users-list');
  try {
    const { data, error } = await sb.from('admin_users_view').select('*');
    if (error) throw error;
    allUsers = data || [];
    renderUsers(allUsers, true);
    setupUserSearch();
  } catch (err) {
    el.innerHTML = `<div class="empty-state"><p class="text-muted">${err.message}</p></div>`;
  }
}

async function loadOrgUsers() {
  document.getElementById('users-card-title').textContent = 'Team';
  const el = document.getElementById('users-list');
  try {
    const { data, error } = await sb.from('user_profiles').select('*').order('full_name');
    if (error) throw error;
    allUsers = data || [];
    renderUsers(allUsers, false);
    setupUserSearch();
  } catch (err) {
    el.innerHTML = `<div class="empty-state"><p class="text-muted">${err.message}</p></div>`;
  }
}

function renderUsers(users, showCompany) {
  const el = document.getElementById('users-list');
  if (!users.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">👥</div><h3>No users yet</h3><p>Use the invite form below to add team members.</p></div>`;
    return;
  }
  el.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          ${showCompany ? '<th>Company</th>' : ''}
          <th>Role</th>
          <th>Since</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${users.map(u => renderUserRow(u, showCompany)).join('')}
      </tbody>
    </table>`;
}

function renderUserRow(u, showCompany) {
  const roleLabel = { admin: 'Platform Admin', org_admin: 'Org Admin', user: 'User' }[u.role] || u.role;
  const roleCls   = { admin: 'badge-danger', org_admin: 'badge-info', user: 'badge-neutral' }[u.role] || 'badge-neutral';
  const isSelf    = u.id === currentProfile.id;

  return `
    <tr>
      <td class="td-name">${u.full_name || '<em class="text-muted">No name</em>'}</td>
      <td class="text-sm text-muted">${escHtml(u.email || '—')}</td>
      ${showCompany ? `<td class="text-sm">${escHtml(u.org_name || '—')}</td>` : ''}
      <td><span class="badge ${roleCls}">${roleLabel}</span></td>
      <td class="text-sm text-muted">${formatDate(u.created_at)}</td>
      <td style="display:flex;gap:6px;flex-wrap:wrap">
        ${!isSelf ? `<button class="btn btn-ghost btn-sm" onclick="changeRole('${u.id}','${u.role}','${escHtml(u.full_name||u.email||u.id)}',${showCompany},${showCompany ? `'${u.org_id}'` : 'null'})">Change Role</button>` : ''}
        ${showCompany ? `<button class="btn btn-ghost btn-sm" onclick="moveUser('${u.id}','${escHtml(u.full_name||u.email||u.id)}','${u.org_id||''}')">Move</button>` : ''}
        ${!isSelf ? `<button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="removeUser('${u.id}','${escHtml(u.full_name||u.email||u.id)}')">Remove</button>` : ''}
      </td>
    </tr>`;
}

function setupUserSearch() {
  document.getElementById('user-search').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    const filtered = allUsers.filter(u =>
      (u.full_name || '').toLowerCase().includes(q) ||
      (u.email || '').toLowerCase().includes(q) ||
      (u.org_name || '').toLowerCase().includes(q)
    );
    renderUsers(filtered, currentProfile.role === 'admin');
  });
}

async function changeRole(userId, currentRole, name, showCompany, orgId) {
  const isPlatformAdmin = currentProfile.role === 'admin';
  const options = isPlatformAdmin
    ? [['user','User'],['org_admin','Org Admin'],['admin','Platform Admin']]
    : [['user','User'],['org_admin','Org Admin']];

  openModal({
    title: `Change Role — ${name}`,
    body: `
      <div class="form-group">
        <label class="form-label">New Role</label>
        <select id="new-role">
          ${options.map(([v,l]) => `<option value="${v}"${v===currentRole?' selected':''}>${l}</option>`).join('')}
        </select>
      </div>`,
    confirmText: 'Save',
    onConfirm: async (overlay) => {
      const role = document.getElementById('new-role').value;
      const btn  = overlay.querySelector('#modal-confirm');
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        const { error } = await sb.from('user_profiles').update({ role }).eq('id', userId);
        if (error) throw error;
        overlay.remove(); showToast('Role updated.');
        if (showCompany) loadAllUsers(); else loadOrgUsers();
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false; btn.textContent = 'Save';
      }
    }
  });
}

async function moveUser(userId, name, currentOrgId) {
  const orgs = allCompanies;
  openModal({
    title: `Move ${name} to another company`,
    body: `
      <div class="form-group">
        <label class="form-label">Company</label>
        <select id="move-org">
          ${orgs.map(o => `<option value="${o.id}"${o.id===currentOrgId?' selected':''}>${escHtml(o.name)}</option>`).join('')}
        </select>
      </div>`,
    confirmText: 'Move',
    onConfirm: async (overlay) => {
      const orgId = document.getElementById('move-org').value;
      const btn   = overlay.querySelector('#modal-confirm');
      btn.disabled = true; btn.textContent = 'Moving…';
      try {
        const { error } = await sb.from('user_profiles').update({ org_id: orgId }).eq('id', userId);
        if (error) throw error;
        overlay.remove(); showToast('User moved.');
        loadAllUsers();
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false; btn.textContent = 'Move';
      }
    }
  });
}

async function removeUser(userId, name) {
  openModal({
    title: `Remove ${name}?`,
    body: `<p class="text-muted">This removes their profile and access. Their auth account remains but they won't be able to use the app.</p>`,
    confirmText: 'Remove',
    confirmCls: 'btn-danger',
    onConfirm: async (overlay) => {
      const btn = overlay.querySelector('#modal-confirm');
      btn.disabled = true; btn.textContent = 'Removing…';
      try {
        const { error } = await sb.from('user_profiles').delete().eq('id', userId);
        if (error) throw error;
        overlay.remove(); showToast('User removed.');
        if (currentProfile.role === 'admin') loadAllUsers(); else loadOrgUsers();
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false; btn.textContent = 'Remove';
      }
    }
  });
}

// ─── Invite ────────────────────────────────────────────────────────────────────
function setupInvite(isPlatformAdmin) {
  if (isPlatformAdmin) {
    document.getElementById('inv-company-group').style.display = '';
    // Platform admin can also grant platform admin role
    const roleSelect = document.getElementById('inv-role');
    roleSelect.innerHTML += '<option value="admin">Platform Admin</option>';
  }

  document.getElementById('btn-send-invite').addEventListener('click', async () => {
    const email   = document.getElementById('inv-email').value.trim();
    const name    = document.getElementById('inv-name').value.trim();
    const role    = document.getElementById('inv-role').value;
    const org_id  = isPlatformAdmin ? document.getElementById('inv-org').value : currentProfile.org_id;

    if (!email) { showToast('Email is required.', 'error'); return; }
    if (isPlatformAdmin && !org_id) { showToast('Please select a company.', 'error'); return; }

    const btn = document.getElementById('btn-send-invite');
    btn.disabled = true; btn.textContent = 'Sending…';

    try {
      const { data: { session } } = await sb.auth.getSession();
      const resp = await fetch('/.netlify/functions/invite-user', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${session.access_token}`,
        },
        body: JSON.stringify({ email, full_name: name, role, org_id }),
      });
      const json = await resp.json();
      if (!resp.ok || json.error) throw new Error(json.error || 'Invite failed');
      document.getElementById('inv-name').value  = '';
      document.getElementById('inv-email').value = '';
      showToast(`Invite sent to ${email}.`);
      if (isPlatformAdmin) loadAllUsers(); else loadOrgUsers();
    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Send Invite';
    }
  });
}

// ─── Products ──────────────────────────────────────────────────────────────────
async function loadProducts() {
  const el = document.getElementById('products-list');
  try {
    const products = await getProducts();
    if (!products.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><h3>No products yet</h3></div>`;
      return;
    }
    el.innerHTML = `
      <table>
        <thead><tr><th>Name</th><th>SKU</th><th>Status</th><th>Created</th><th></th></tr></thead>
        <tbody>
          ${products.map(p => `
            <tr>
              <td class="td-name"><a href="product.html?id=${p.id}">${escHtml(p.name)}</a></td>
              <td class="td-sku">${p.sku || '—'}</td>
              <td>${p.is_active ? '<span class="badge badge-success">Active</span>' : '<span class="badge badge-neutral">Inactive</span>'}</td>
              <td class="text-muted text-sm">${formatDate(p.created_at)}</td>
              <td>
                <button class="btn btn-ghost btn-sm" onclick="editProduct('${p.id}','${escHtml(p.name)}','${escHtml(p.sku||'')}','${escHtml(p.description||'')}')">Edit</button>
                <button class="btn btn-ghost btn-sm" onclick="toggleProduct('${p.id}',${p.is_active})">${p.is_active ? 'Deactivate' : 'Activate'}</button>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  } catch (err) {
    el.innerHTML = `<div class="empty-state"><p class="text-muted">${err.message}</p></div>`;
  }
}

function setupProductBtn() {
  document.getElementById('btn-new-product').addEventListener('click', () => {
    openModal({
      title: 'Add Product',
      body: `
        <div class="form-group"><label class="form-label">Name <span class="required">*</span></label><input type="text" id="p-name" placeholder="Hydrating Face Cream"></div>
        <div class="form-group"><label class="form-label">SKU</label><input type="text" id="p-sku" placeholder="HFC-001"></div>
        <div class="form-group"><label class="form-label">Description</label><textarea id="p-desc" rows="2"></textarea></div>`,
      confirmText: 'Add Product',
      onConfirm: async (overlay) => {
        const name = document.getElementById('p-name').value.trim();
        if (!name) { showToast('Name required.', 'error'); return; }
        const btn = overlay.querySelector('#modal-confirm');
        btn.disabled = true; btn.textContent = 'Adding…';
        try {
          await createProduct({ name, sku: document.getElementById('p-sku').value.trim(), description: document.getElementById('p-desc').value.trim() });
          overlay.remove(); showToast('Product added.'); loadProducts();
        } catch (err) { showToast(err.message, 'error'); btn.disabled = false; btn.textContent = 'Add Product'; }
      }
    });
  });
}

function editProduct(id, name, sku, desc) {
  openModal({
    title: 'Edit Product',
    body: `
      <div class="form-group"><label class="form-label">Name <span class="required">*</span></label><input type="text" id="ep-name" value="${name}"></div>
      <div class="form-group"><label class="form-label">SKU</label><input type="text" id="ep-sku" value="${sku}"></div>
      <div class="form-group"><label class="form-label">Description</label><textarea id="ep-desc" rows="2">${desc}</textarea></div>`,
    confirmText: 'Save',
    onConfirm: async (overlay) => {
      const name = document.getElementById('ep-name').value.trim();
      if (!name) { showToast('Name required.', 'error'); return; }
      const btn = overlay.querySelector('#modal-confirm');
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        await updateProduct(id, { name, sku: document.getElementById('ep-sku').value.trim() || null, description: document.getElementById('ep-desc').value.trim() || null });
        overlay.remove(); showToast('Product updated.'); loadProducts();
      } catch (err) { showToast(err.message, 'error'); btn.disabled = false; btn.textContent = 'Save'; }
    }
  });
}

async function toggleProduct(id, isActive) {
  try {
    await updateProduct(id, { is_active: !isActive });
    showToast(`Product ${isActive ? 'deactivated' : 'activated'}.`);
    loadProducts();
  } catch (err) { showToast(err.message, 'error'); }
}

// ─── Document Types ────────────────────────────────────────────────────────────
async function loadDocTypes() {
  const el = document.getElementById('doctypes-list');
  try {
    const types = await getDocumentTypes();
    el.innerHTML = `
      <table>
        <thead><tr><th>#</th><th>Name</th><th>Code</th><th>Description</th><th>Status</th><th></th></tr></thead>
        <tbody>
          ${types.map(t => `
            <tr style="${!t.is_active ? 'opacity:.55' : ''}">
              <td class="text-muted text-sm">${t.sort_order}</td>
              <td class="td-name">${escHtml(t.name)}</td>
              <td><code style="background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:.8rem">${t.code}</code></td>
              <td class="text-muted text-sm">${escHtml(t.description || '—')}</td>
              <td>${t.is_active ? '<span class="badge badge-success">Active</span>' : '<span class="badge badge-neutral">Disabled</span>'}</td>
              <td>
                <button class="btn btn-ghost btn-sm" onclick="editDocType('${t.id}','${escHtml(t.name)}','${escHtml(t.description||'')}',${t.sort_order})">Edit</button>
                <button class="btn btn-ghost btn-sm" onclick="toggleDocType('${t.id}',${t.is_active},'${escHtml(t.name)}')">${t.is_active ? 'Disable' : 'Enable'}</button>
                <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteDocType('${t.id}','${escHtml(t.name)}')">Delete</button>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  } catch (err) {
    el.innerHTML = `<div class="empty-state"><p class="text-muted">${err.message}</p></div>`;
  }
}

function setupDocTypeBtn() {
  document.getElementById('btn-new-doctype').addEventListener('click', async () => {
    const markets = await getMarkets();
    const marketCheckboxes = markets.map(m => `
      <div style="display:flex;align-items:center;gap:16px;padding:8px 0;border-bottom:1px solid var(--border)">
        <strong style="width:140px;font-size:.85rem">${m.name} (${m.code})</strong>
        <label style="display:flex;align-items:center;gap:6px;font-size:.85rem;cursor:pointer">
          <input type="checkbox" id="dt-market-${m.id}" checked> Required
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-size:.85rem;cursor:pointer">
          <input type="checkbox" id="dt-optional-${m.id}"> Optional
        </label>
      </div>`).join('');

    openModal({
      title: 'Add Document Type',
      body: `
        <div class="form-group"><label class="form-label">Name <span class="required">*</span></label><input type="text" id="dt-name" placeholder="e.g. Safety Data Sheet"></div>
        <div class="form-group"><label class="form-label">Code <span class="required">*</span></label><input type="text" id="dt-code" placeholder="SDS" style="text-transform:uppercase"><span class="form-hint">Short uppercase identifier, no spaces.</span></div>
        <div class="form-group"><label class="form-label">Description</label><textarea id="dt-desc" rows="2"></textarea></div>
        <div class="form-group"><label class="form-label">Sort Order</label><input type="text" id="dt-order" placeholder="10"></div>
        <div class="form-group"><label class="form-label">Market Requirements</label>${marketCheckboxes}</div>`,
      confirmText: 'Add',
      onConfirm: async (overlay) => {
        const name  = document.getElementById('dt-name').value.trim();
        const code  = document.getElementById('dt-code').value.trim().toUpperCase().replace(/\s+/g,'_');
        const desc  = document.getElementById('dt-desc').value.trim();
        const order = parseInt(document.getElementById('dt-order').value) || 99;
        if (!name || !code) { showToast('Name and Code are required.', 'error'); return; }
        const btn = overlay.querySelector('#modal-confirm');
        btn.disabled = true; btn.textContent = 'Adding…';
        try {
          const { data: newType, error } = await sb.from('document_types').insert({ name, code, description: desc || null, sort_order: order }).select().single();
          if (error) throw error;
          const reqs = [];
          markets.forEach(m => {
            const required = document.getElementById(`dt-market-${m.id}`)?.checked;
            const optional = document.getElementById(`dt-optional-${m.id}`)?.checked;
            if (required || optional) reqs.push({ market_id: m.id, document_type_id: newType.id, is_required: required && !optional });
          });
          if (reqs.length) { const { error: reqErr } = await sb.from('market_document_requirements').insert(reqs); if (reqErr) throw reqErr; }
          overlay.remove(); showToast('Document type added.'); loadDocTypes();
        } catch (err) { showToast(err.message, 'error'); btn.disabled = false; btn.textContent = 'Add'; }
      }
    });
  });
}

function editDocType(id, name, desc, order) {
  openModal({
    title: 'Edit Document Type',
    body: `
      <div class="form-group"><label class="form-label">Name <span class="required">*</span></label><input type="text" id="edt-name" value="${name}"></div>
      <div class="form-group"><label class="form-label">Description</label><textarea id="edt-desc" rows="2">${desc}</textarea></div>
      <div class="form-group"><label class="form-label">Sort Order</label><input type="text" id="edt-order" value="${order}"></div>`,
    confirmText: 'Save',
    onConfirm: async (overlay) => {
      const name  = document.getElementById('edt-name').value.trim();
      const order = parseInt(document.getElementById('edt-order').value) || 99;
      if (!name) { showToast('Name required.', 'error'); return; }
      const btn = overlay.querySelector('#modal-confirm');
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        const { error } = await sb.from('document_types').update({ name, description: document.getElementById('edt-desc').value.trim() || null, sort_order: order }).eq('id', id);
        if (error) throw error;
        overlay.remove(); showToast('Updated.'); loadDocTypes();
      } catch (err) { showToast(err.message, 'error'); btn.disabled = false; btn.textContent = 'Save'; }
    }
  });
}

async function toggleDocType(id, isActive, name) {
  if (isActive) {
    openModal({
      title: `Disable "${name}"?`,
      body: `<p class="text-muted">This hides <strong>${escHtml(name)}</strong> from all product dashboards. You can re-enable it at any time.</p>`,
      confirmText: 'Disable', confirmCls: 'btn-warning',
      onConfirm: async (overlay) => {
        const btn = overlay.querySelector('#modal-confirm');
        btn.disabled = true; btn.textContent = 'Saving…';
        try { await setDocTypeActive(id, false); overlay.remove(); showToast(`"${name}" disabled.`); loadDocTypes(); }
        catch (err) { showToast(err.message, 'error'); btn.disabled = false; btn.textContent = 'Disable'; }
      }
    });
  } else {
    try { await setDocTypeActive(id, true); showToast(`"${name}" re-enabled.`); loadDocTypes(); }
    catch (err) { showToast(err.message, 'error'); }
  }
}

async function deleteDocType(id, name) {
  const { count } = await sb.from('documents').select('id', { count: 'exact', head: true }).eq('document_type_id', id);
  if (count > 0) { showToast(`Cannot delete — ${count} document(s) use this type.`, 'error'); return; }
  openModal({
    title: 'Delete Document Type',
    body: `<p>Delete <strong>${escHtml(name)}</strong>? This also removes its market requirements.</p>`,
    confirmText: 'Delete', confirmCls: 'btn-danger',
    onConfirm: async (overlay) => {
      const btn = overlay.querySelector('#modal-confirm');
      btn.disabled = true; btn.textContent = 'Deleting…';
      try {
        const { error } = await sb.from('document_types').delete().eq('id', id);
        if (error) throw error;
        overlay.remove(); showToast('Deleted.'); loadDocTypes();
      } catch (err) { showToast(err.message, 'error'); btn.disabled = false; btn.textContent = 'Delete'; }
    }
  });
}

// ─── Util ──────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script>
</body>
</html>
