<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Compliance Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🧴</div>
      <div>
        <div class="logo-text">Compliance Mgr</div>
        <div class="logo-sub">Cosmetics Regulatory</div>
      </div>
    </div>
    <div class="sidebar-nav">
      <span class="nav-label">Compliance</span>
      <a href="dashboard.html" class="nav-link active">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <span class="nav-label admin-only">Admin</span>
      <a href="admin.html" class="nav-link admin-only">
        <span class="nav-icon">⚙️</span> Manage
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="nav-user" onclick="openProfileEditor()" style="cursor:pointer" title="Edit profile">Loading…</div>
          <div class="user-role" id="nav-role">User</div>
        </div>
        <button class="btn-signout" onclick="signOut()" title="Sign out">⏏</button>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <div class="main-content">
    <div class="page-header">
      <div class="page-header-left">
        <h1>Compliance Dashboard</h1>
        <p>Overview of all products and their regulatory status across markets.</p>
      </div>
      <div class="page-header-actions">
        <div class="search-bar">
          <input type="text" id="search" placeholder="Search products…">
        </div>
        <button class="btn btn-primary admin-only" id="btn-add-product">+ Add Product</button>
      </div>
    </div>

    <div class="page-body">

      <!-- Stats -->
      <div class="stats-row" id="stats-row">
        <div class="stat-card">
          <div class="stat-label">Total Products</div>
          <div class="stat-value" id="stat-total">—</div>
        </div>
        <div class="stat-card stat-success">
          <div class="stat-label">Fully Complete</div>
          <div class="stat-value" id="stat-complete">—</div>
        </div>
        <div class="stat-card stat-warning">
          <div class="stat-label">Incomplete</div>
          <div class="stat-value" id="stat-incomplete">—</div>
        </div>
        <div class="stat-card stat-danger">
          <div class="stat-label">Outdated</div>
          <div class="stat-value" id="stat-outdated">—</div>
        </div>
      </div>

      <!-- Products table -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Products</span>
          <span id="product-count" class="text-muted text-sm"></span>
        </div>
        <div class="table-wrap" id="products-table">
          <div class="loader-wrap"><div class="spinner"></div><p>Loading products…</p></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Add Product Modal -->
<template id="modal-add-product">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start">
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="form-group">
        <label class="form-label">Product Name <span class="required">*</span></label>
        <input type="text" id="new-name" placeholder="e.g. Hydrating Face Cream" required>
      </div>
      <div class="form-group">
        <label class="form-label">SKU / Product Code</label>
        <input type="text" id="new-sku" placeholder="e.g. HFC-001">
        <span class="form-hint">Optional internal reference code.</span>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="new-desc" rows="4" placeholder="Brief product description…"></textarea>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Markets <span class="required">*</span></label>
      <div id="new-markets-list" style="display:flex;flex-direction:column;gap:8px;margin-top:4px;max-height:260px;overflow-y:auto;padding-right:4px">
        <span class="text-muted text-sm">Loading markets…</span>
      </div>
      <span class="form-hint">Select all markets this product will be sold in.</span>
    </div>
  </div>
</template>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
let allRows  = [];
let aiChecks = {};

async function init() {
  const session = await requireAuth();
  if (!session) return;

  const profile = await getUserProfile();
  if (profile) {
    document.getElementById('nav-user').textContent = profile.full_name || profile.id.slice(0, 8);
    document.getElementById('nav-role').textContent = { admin: 'Platform Admin', org_admin: 'Org Admin', user: 'User' }[profile.role] || 'User';
    document.getElementById('user-avatar').textContent = (profile.full_name || 'U')[0].toUpperCase();
    if (profile.role === 'admin' || profile.role === 'org_admin') {
      document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('admin-only'));
    }
  }

  await loadDashboard();
  setupSearch();
  setupAddProduct();
}

async function loadDashboard() {
  const tableEl = document.getElementById('products-table');
  showLoader(tableEl, 'Loading compliance data…');

  try {
    const [rows, aiData] = await Promise.all([
      getComplianceSummary(),
      getAiCheckSummaryByProduct(),
    ]);
    allRows  = rows;
    aiChecks = aiData;
    renderStats(rows);
    renderTable(rows);
  } catch (err) {
    tableEl.innerHTML = `<div class="empty-state"><p class="text-muted">Failed to load: ${err.message}</p></div>`;
  }
}

function renderStats(rows) {
  // Group by product: a product is "complete" only if ALL assigned markets are complete
  const products = {};
  rows.forEach(r => {
    if (!products[r.product_id]) products[r.product_id] = [];
    products[r.product_id].push(r.compliance_status);
  });
  const ids = Object.keys(products);
  let complete = 0, incomplete = 0, outdated = 0;
  ids.forEach(id => {
    const statuses = products[id];
    if (statuses.some(s => s === 'outdated'))    outdated++;
    else if (statuses.some(s => s === 'incomplete' || s === 'unchecked')) incomplete++;
    else complete++;
  });
  document.getElementById('stat-total').textContent     = ids.length;
  document.getElementById('stat-complete').textContent  = complete;
  document.getElementById('stat-incomplete').textContent = incomplete;
  document.getElementById('stat-outdated').textContent  = outdated;
}

const STATUS_RANK = { outdated: 0, incomplete: 1, unchecked: 2, complete: 3 };

function productGroup(marketList) {
  const statuses = marketList.map(m => m.compliance_status);
  if (statuses.some(s => s === 'outdated'))                          return 'outdated';
  if (statuses.some(s => s === 'incomplete' || s === 'unchecked'))   return 'incomplete';
  return 'complete';
}

function renderTable(rows) {
  const tableEl = document.getElementById('products-table');

  // Group rows by product
  const byProduct = {};
  rows.forEach(r => {
    if (!byProduct[r.product_id]) byProduct[r.product_id] = { name: r.product_name, sku: r.sku, id: r.product_id, markets: {} };
    byProduct[r.product_id].markets[r.market_code] = r;
  });

  const products = Object.values(byProduct);
  document.getElementById('product-count').textContent = `${products.length} product${products.length !== 1 ? 's' : ''}`;

  if (products.length === 0) {
    tableEl.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📦</div>
        <h3>No products yet</h3>
        <p>Add your first product to start tracking compliance.</p>
      </div>`;
    return;
  }

  const GROUPS = [
    { key: 'outdated',   label: '🔴 Outdated'   },
    { key: 'incomplete', label: '⚠️ Incomplete'  },
    { key: 'complete',   label: '✅ Complete'    },
  ];

  // Assign each product to a group
  const grouped = { outdated: [], incomplete: [], complete: [] };
  products.forEach(p => grouped[productGroup(Object.values(p.markets))].push(p));

  // Build tbody rows — group header + product rows
  const bodyRows = GROUPS.flatMap(g => {
    const list = grouped[g.key];
    if (!list.length) return [];
    return [
      `<tr class="group-header-row"><td colspan="7">${g.label} <span style="font-weight:400;opacity:.7">(${list.length})</span></td></tr>`,
      ...list.map(p => renderProductRow(p, aiChecks[p.id])),
    ];
  });

  tableEl.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Product</th>
          <th>SKU</th>
          <th>Status</th>
          <th>Markets</th>
          <th>Docs</th>
          <th>AI Checks</th>
          <th></th>
        </tr>
      </thead>
      <tbody>${bodyRows.join('')}</tbody>
    </table>`;
}

function renderProductRow(p, ai) {
  const marketList  = Object.values(p.markets);
  const worstStatus = marketList.reduce((worst, m) =>
    (STATUS_RANK[m.compliance_status] ?? 4) < (STATUS_RANK[worst] ?? 4) ? m.compliance_status : worst
  , 'complete');
  const docsPresent = marketList.reduce((s, m) => s + (m.docs_present || 0), 0);
  const docsTotal   = marketList.reduce((s, m) => s + (m.total_required || 0), 0);
  const marketPills = marketList.map(m =>
    `<span style="display:inline-block;padding:1px 6px;border-radius:9px;background:var(--surface-2);font-size:.75rem;color:var(--text-muted)">${m.market_code}</span>`
  ).join(' ');

  return `
    <tr>
      <td class="td-name">${p.name}</td>
      <td class="td-sku">${p.sku || '—'}</td>
      <td>${marketList.length ? complianceBadge(worstStatus) : '<span class="badge badge-neutral">—</span>'}</td>
      <td>${marketPills || '<span class="text-muted text-sm">None</span>'}</td>
      <td><span class="text-sm text-muted">${docsTotal ? `${docsPresent}/${docsTotal}` : '—'}</span></td>
      <td>${renderAiCheckCell(ai)}</td>
      <td><a href="product.html?id=${p.id}" class="btn btn-secondary btn-sm">View →</a></td>
    </tr>`;
}

function renderAiCheckCell(ai) {
  if (!ai || ai.total === 0) return '<span class="text-muted text-sm">—</span>';
  const parts = [];
  if (ai.pass > 0)      parts.push(`<span style="color:var(--success);font-weight:500">✓ ${ai.pass}</span>`);
  if (ai.warning > 0)   parts.push(`<span style="color:var(--warning);font-weight:500">⚠ ${ai.warning}</span>`);
  if (ai.fail > 0)      parts.push(`<span style="color:var(--danger);font-weight:500">✗ ${ai.fail}</span>`);
  if (ai.unchecked > 0) parts.push(`<span class="text-muted">○ ${ai.unchecked}</span>`);
  return `<span class="text-sm" style="display:flex;gap:8px;align-items:center">${parts.join('')}</span>`;
}

function setupSearch() {
  document.getElementById('search').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    const filtered = allRows.filter(r =>
      r.product_name.toLowerCase().includes(q) ||
      (r.sku || '').toLowerCase().includes(q)
    );
    renderTable(filtered);
  });
}

function setupAddProduct() {
  document.getElementById('btn-add-product')?.addEventListener('click', async () => {
    const markets = await getMarkets();
    const tmpl = document.getElementById('modal-add-product').innerHTML;
    openModal({
      title: 'Add New Product',
      body: tmpl,
      cls: 'modal-lg',
      confirmText: 'Add Product',
      confirmCls: 'btn-primary',
      onConfirm: async (overlay) => {
        const name = document.getElementById('new-name').value.trim();
        const sku  = document.getElementById('new-sku').value.trim();
        const desc = document.getElementById('new-desc').value.trim();
        const marketIds = markets.filter(m => document.getElementById(`mkt-${m.id}`)?.checked).map(m => m.id);
        if (!name) { showToast('Product name is required.', 'error'); return; }
        if (!marketIds.length) { showToast('Select at least one market.', 'error'); return; }
        const btn = overlay.querySelector('#modal-confirm');
        btn.disabled = true; btn.textContent = 'Adding…';
        try {
          await createProduct({ name, sku, description: desc, marketIds });
          overlay.remove();
          showToast('Product added successfully.');
          await loadDashboard();
        } catch (err) {
          showToast(err.message, 'error');
          btn.disabled = false; btn.textContent = 'Add Product';
        }
      }
    });
    // Populate markets checkboxes after modal renders
    const container = document.getElementById('new-markets-list');
    if (container) {
      container.innerHTML = markets.filter(m => m.is_active).map(m =>
        `<label style="display:flex;align-items:center;gap:8px;font-size:.875rem;cursor:pointer">
          <input type="checkbox" id="mkt-${m.id}" value="${m.id}">
          ${m.name} <span class="text-muted" style="font-size:.8rem">(${m.code})</span>
        </label>`
      ).join('');
    }
  });
}

init();
</script>
</body>
</html>
